<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>恢复管理</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Edge Session Recovery</h1>
        <p>支持按检查点恢复，也支持按“检查点 + 增量日志”重建并恢复最新状态。</p>
      </header>
      <section>
        <div class="toolbar">
          <button id="capture-checkpoint">手动保存 checkpoint</button>
          <button id="restore-latest">恢复最新状态</button>
          <button id="refresh">刷新列表</button>
        </div>
        <div id="snapshot-list" class="snapshot-list"></div>
      </section>
    </main>
    <template id="snapshot-template">
      <article class="card">
        <div>
          <h2 class="title"></h2>
          <p class="meta"></p>
        </div>
        <button class="restore">恢复该检查点</button>
      </article>
    </template>
    <script type="module" src="options.js"></script>
  </body>
</html>
