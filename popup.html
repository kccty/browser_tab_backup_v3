<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edge History Recovery</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup-shell">
    <section class="hero-card">
      <div class="hero-copy">
        <span class="eyebrow">Edge History Recovery</span>
        <h1>页签恢复中心</h1>
        <p class="muted" id="subtitle">查看最近一次 checkpoint 的恢复预览</p>
      </div>
      <div class="hero-actions toolbar-grid">
        <button id="saveCheckpointBtn">保存</button>
        <button id="restoreLatestBtn" class="secondary">恢复</button>
        <button id="exportBtn" class="secondary">导出</button>
        <button id="importBtn" class="secondary">导入</button>
        <button id="refreshBtn" class="ghost">刷新</button>
        <button id="openPreviewBtn" class="ghost">单独页面</button>
      </div>
      <input id="importFileInput" type="file" accept="application/json,.json" hidden />
    </section>

    <section class="panel preview-panel">
      <div class="status-banner" id="status">正在加载预览…</div>
      <div class="preview-list hidden" id="previewList"></div>
    </section>
  </main>

  <script src="ui-shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
