<!doctype html>
<html>
<head>
<meta charset="UTF-8" />
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f9f9f9; color: #333; }
.container { text-align: center; max-width: 600px; padding: 20px; }
.title { font-size: 16px; margin-bottom: 8px; }
.url { font-size: 12px; color: #666; word-break: break-all; }
.hint { font-size: 12px; color: #999; margin-top: 12px; }
</style>
</head>
<body>
<div class="container">
  <div class="title" id="title">加载中…</div>
  <div class="url" id="url"></div>
  <div class="hint">点击此标签页时自动加载</div>
</div>
<script>
const params = new URLSearchParams(location.search);
const targetUrl = params.get('url') || '';
const targetTitle = params.get('title') || targetUrl || '标签页';
document.getElementById('title').textContent = targetTitle;
document.getElementById('url').textContent = targetUrl;
document.title = targetTitle;

// 当标签被激活时自动跳转
if (targetUrl) {
  // 如果当前就是活动标签，立即跳转
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && targetUrl) {
      location.replace(targetUrl);
    }
  });
  // 点击页面也跳转
  document.body.addEventListener('click', () => {
    location.replace(targetUrl);
  });
}
</script>
</body>
</html>
